name: Verify

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Node test suite
        run: npm test

      - name: Validate Python bridge scripts
        run: npm run test:python
