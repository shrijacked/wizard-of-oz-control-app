<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">wizard of oz control application system overview</title>
  <desc id="desc">system architecture showing inputs, local server, adaptive engine, operator dashboard, participant display, audit display, and exports.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbf4ea"/>
      <stop offset="100%" stop-color="#efe0cf"/>
    </linearGradient>
    <linearGradient id="panelFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffdf9"/>
      <stop offset="100%" stop-color="#f8efe4"/>
    </linearGradient>
    <linearGradient id="coreFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16334a"/>
      <stop offset="100%" stop-color="#245674"/>
    </linearGradient>
    <linearGradient id="supportFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#edf7f6"/>
      <stop offset="100%" stop-color="#d7efea"/>
    </linearGradient>
    <linearGradient id="logFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff5ef"/>
      <stop offset="100%" stop-color="#f9ddd4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#7d5c46" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#516674"/>
    </marker>
    <style>
      .title { font: 700 34px 'Avenir Next', 'Segoe UI', Arial, sans-serif; fill: #201a17; }
      .subtitle { font: 400 18px 'Avenir Next', 'Segoe UI', Arial, sans-serif; fill: #6d6259; }
      .label { font: 700 14px 'Avenir Next', 'Segoe UI', Arial, sans-serif; fill: #6d6259; letter-spacing: 2px; text-transform: uppercase; }
      .boxTitleLight { font: 700 23px 'Avenir Next', 'Segoe UI', Arial, sans-serif; fill: #1d2429; }
      .boxTitleDark { font: 700 24px 'Avenir Next', 'Segoe UI', Arial, sans-serif; fill: #fff7ef; }
      .body { font: 400 17px 'Avenir Next', 'Segoe UI', Arial, sans-serif; fill: #51463f; }
      .bodyDark { font: 400 17px 'Avenir Next', 'Segoe UI', Arial, sans-serif; fill: #e9f1f4; }
      .small { font: 600 14px 'Avenir Next', 'Segoe UI', Arial, sans-serif; fill: #0a7a78; }
      .logText { font: 400 17px 'Avenir Next', 'Segoe UI', Arial, sans-serif; fill: #5a4136; }
      .arrowLabel { font: 600 14px 'Avenir Next', 'Segoe UI', Arial, sans-serif; fill: #516674; }
    </style>
  </defs>

  <rect width="1280" height="860" fill="url(#bg)"/>
  <circle cx="1020" cy="120" r="200" fill="#fff6ec" opacity="0.6"/>
  <circle cx="180" cy="730" r="260" fill="#f6e8da" opacity="0.72"/>

  <text x="72" y="80" class="title">wizard of oz control application</text>
  <text x="72" y="114" class="subtitle">local first multi screen control system for live hri puzzle studies</text>

  <text x="92" y="188" class="label">live inputs</text>
  <text x="506" y="144" class="label">core runtime</text>
  <text x="930" y="188" class="label">research outputs</text>

  <g filter="url(#shadow)">
    <rect x="72" y="210" rx="26" ry="26" width="270" height="122" fill="url(#panelFill)" stroke="#d5c4b2"/>
    <text x="100" y="254" class="boxTitleLight">usb webcam</text>
    <text x="100" y="286" class="body">live observation feed for</text>
    <text x="100" y="312" class="body">the researcher dashboard</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="368" rx="26" ry="26" width="270" height="130" fill="url(#supportFill)" stroke="#b8dfd7"/>
    <text x="100" y="412" class="boxTitleLight">hrv watch</text>
    <text x="100" y="444" class="body">python watch bridge writes</text>
    <text x="100" y="470" class="body">timestamped telemetry entries</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="534" rx="26" ry="26" width="270" height="130" fill="url(#supportFill)" stroke="#b8dfd7"/>
    <text x="100" y="578" class="boxTitleLight">gaze bridge</text>
    <text x="100" y="610" class="body">sdk or http source streams</text>
    <text x="100" y="636" class="body">attention and fixation data</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="414" y="180" rx="34" ry="34" width="452" height="370" fill="url(#coreFill)"/>
    <text x="448" y="236" class="boxTitleDark">local node server</text>
    <text x="448" y="276" class="bodyDark">http api</text>
    <text x="448" y="304" class="bodyDark">websocket hub</text>
    <text x="448" y="332" class="bodyDark">file backed state store</text>
    <text x="448" y="360" class="bodyDark">session controls and operator safeguards</text>

    <rect x="448" y="394" rx="20" ry="20" width="178" height="104" fill="#f5fbfa" opacity="0.96"/>
    <text x="474" y="434" class="boxTitleLight">adaptive engine</text>
    <text x="474" y="462" class="body">hrv plus gaze</text>
    <text x="474" y="486" class="body">intervention logic</text>

    <rect x="648" y="394" rx="20" ry="20" width="184" height="104" fill="#fff2ec" opacity="0.98"/>
    <text x="674" y="434" class="boxTitleLight">event logger</text>
    <text x="674" y="462" class="logText">jsonl timeline</text>
    <text x="674" y="486" class="logText">state snapshots</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="940" y="210" rx="26" ry="26" width="270" height="136" fill="url(#panelFill)" stroke="#d5c4b2"/>
    <text x="968" y="254" class="boxTitleLight">admin dashboard</text>
    <text x="968" y="286" class="body">camera, telemetry, hints,</text>
    <text x="968" y="312" class="body">robot actions, session controls</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="940" y="390" rx="26" ry="26" width="270" height="116" fill="url(#supportFill)" stroke="#b8dfd7"/>
    <text x="968" y="434" class="boxTitleLight">subject display</text>
    <text x="968" y="466" class="body">minimal live hint screen</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="940" y="540" rx="26" ry="26" width="270" height="116" fill="url(#supportFill)" stroke="#b8dfd7"/>
    <text x="968" y="584" class="boxTitleLight">audit display</text>
    <text x="968" y="616" class="body">latest robot action payload</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="412" y="612" rx="26" ry="26" width="454" height="150" fill="url(#logFill)" stroke="#e5bfb0"/>
    <text x="446" y="658" class="boxTitleLight">exports and post trial review</text>
    <text x="446" y="692" class="logText">bundle json, csv timeline, analytics, replay, completion summary</text>
    <text x="446" y="724" class="small">everything is persisted locally for later analysis</text>
  </g>

  <line x1="342" y1="270" x2="414" y2="270" stroke="#516674" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="342" y1="434" x2="414" y2="352" stroke="#516674" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="342" y1="598" x2="414" y2="434" stroke="#516674" stroke-width="4" marker-end="url(#arrow)"/>

  <line x1="866" y1="278" x2="940" y2="278" stroke="#516674" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="866" y1="448" x2="940" y2="448" stroke="#516674" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="866" y1="598" x2="940" y2="598" stroke="#516674" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="550" x2="640" y2="612" stroke="#516674" stroke-width="4" marker-end="url(#arrow)"/>

  <line x1="540" y1="394" x2="540" y2="360" stroke="#8bc3bb" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="740" y1="394" x2="740" y2="360" stroke="#df9f88" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="356" y="252" class="arrowLabel">video</text>
  <text x="352" y="414" class="arrowLabel">hrv</text>
  <text x="352" y="574" class="arrowLabel">gaze</text>
  <text x="882" y="260" class="arrowLabel">researcher view</text>
  <text x="886" y="430" class="arrowLabel">hint updates</text>
  <text x="874" y="580" class="arrowLabel">action updates</text>
  <text x="652" y="590" class="arrowLabel">exports</text>
</svg>
