<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Robot Audit Display</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="display-page audit-display">
    <main class="display-shell">
      <p class="display-kicker">Audit Display</p>
      <h1>Robotic Action Monitor</h1>

        <p id="audit-action" class="display-message">No robotic action has been logged yet.</p>
        <small id="audit-updated" class="display-meta">Awaiting admin input.</small>
      </section>
    </main>

    <script type="module" src="/audit.js"></script>
  </body>
</html>
